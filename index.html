<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Vercel App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(0, 0, 0, 0.3);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 350px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: #00ffcc;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ccaa;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Hello 👋</h1>
    <p>
      This is a real working website<br>
      created using only HTML.<br><br>
      Deployed on <strong>Vercel</strong> 🚀
    </p>
    <button onclick="sayHello()">Click Me</button>
  </div>

  <script>
    function sayHello() {
      alert("Your Vercel app is working perfectly 🎉");
    }
  </script>

</body>
</html>
